<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' — Quiz Platform'">Quiz Platform</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:fragment="navbar">
    <div class="nav-container">
        <a href="/quizzes" class="nav-brand">🎯 QuizPlatform</a>
        <div class="nav-links">
            <a th:href="@{/quizzes}">Мои квизы</a>
            <a th:href="@{/quizzes/public}">Каталог</a>
            <span sec:authentication="name" class="nav-user"></span>
            <form th:action="@{/auth/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-sm">Выйти</button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
