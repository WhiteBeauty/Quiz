<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Мои квизы — Quiz Platform</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="page-header">
        <h1>Мои квизы</h1>
        <a th:href="@{/quizzes/create}" class="btn btn-primary">+ Создать квиз</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <div th:if="${quizzes.empty}" class="empty-state">
        <p>У вас пока нет квизов. Создайте первый!</p>
    </div>

    <div class="quiz-grid" th:unless="${quizzes.empty}">
        <div class="quiz-card" th:each="quiz : ${quizzes}">
            <div class="quiz-card-header">
                <h3 th:text="${quiz.title}"></h3>
                <span class="badge" th:classappend="${quiz.published} ? 'badge-success' : 'badge-warning'"
                      th:text="${quiz.published} ? 'Опубликован' : 'Черновик'"></span>
            </div>
            <p class="quiz-description" th:text="${quiz.description ?: 'Описание отсутствует'}"></p>
            <p class="quiz-meta">Вопросов: <strong th:text="${quiz.questions.size()}">0</strong></p>
            <div class="quiz-actions">
                <a th:href="@{/quizzes/{id}/questions(id=${quiz.id})}" class="btn btn-secondary">Редактировать</a>
                <form th:if="${quiz.published}" th:action="@{/quizzes/{id}/start-game(id=${quiz.id})}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-success">▶ Начать игру</button>
                </form>
                <form th:action="@{/quizzes/{id}/delete(id=${quiz.id})}" method="post" style="display:inline"
                      onsubmit="return confirm('Удалить квиз?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-danger">Удалить</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
