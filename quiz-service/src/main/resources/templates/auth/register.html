<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация — Quiz Platform</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <h1>🎯 Quiz Platform</h1>
        <h2>Регистрация</h2>

        <div th:if="${#fields.hasGlobalErrors(registrationDto)}" class="alert alert-error">
            <span th:each="err : ${#fields.globalErrors(registrationDto)}" th:text="${err}"></span>
        </div>

        <form th:action="@{/auth/register}" method="post" th:object="${registrationDto}">
            <div class="form-group">
                <label>Имя пользователя</label>
                <input type="text" th:field="*{username}" placeholder="От 3 до 50 символов"/>
                <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="field-error"></span>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" placeholder="example@email.com"/>
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="field-error"></span>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" th:field="*{password}" placeholder="Минимум 6 символов"/>
                <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="field-error"></span>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Зарегистрироваться</button>
        </form>

        <p class="auth-footer">Уже есть аккаунт? <a th:href="@{/auth/login}">Войти</a></p>
    </div>
</div>
</body>
</html>
