﻿﻿﻿﻿<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <title th:text="'Чат с @' + ${peerUsername}">Чат</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" th:href="@{/}"><span class="brand-icon">⬡</span><span>QuizArena</span></a>
    <div class="navbar-links">
        <a th:href="@{/friends}">← Друзья
            <span class="nav-notification-badge" th:if="${unreadMessagesCount > 0}" th:text="${unreadMessagesCount}"></span>
        </a>
    </div>
    <div class="navbar-actions">
        <span class="nav-user" th:text="'@' + ${user.username}">@me</span>
    </div>
</nav>

<div class="chat-page">
    <div class="chat-container">
        <div class="chat-header">
            <h1 th:text="'Чат с @' + ${peerUsername}">Чат</h1>
            <div style="display:flex; gap:8px; align-items:center;">
                <a th:if="${hasMore}" class="btn btn-sm btn-outline"
                   th:href="@{/friends/chat/{id}(id=${peerUserId},before=${oldestCursor})}">Загрузить старые</a>
                <a class="btn btn-sm btn-ghost" th:href="@{/friends}">← Друзья</a>
            </div>
        </div>

        <div id="chatMessages" class="chat-messages"
             th:data-peer-id="${peerUserId}"
             th:data-my-id="${user.id}">
            <div th:each="m : ${messages}"
                 th:class="'chat-message ' + (${m.senderId == user.id} ? 'own' : 'other')"
                 th:data-id="${m.id}">
                <div class="chat-meta" th:text="${m.createdAt}">time</div>
                <div th:text="${m.body}">text</div>
                <div class="chat-status" th:if="${m.senderId == user.id}">
                    <span th:if="${m.deliveredAt != null}">доставлено</span>
                    <span th:if="${m.readAt != null}"> · прочитано</span>
                </div>
            </div>
        </div>

        <form id="chatForm" class="chat-input-area" th:action="@{'/friends/chat/' + ${peerUserId} + '/send-ajax'}" method="post">
            <textarea id="chatInput" name="text" rows="2" required maxlength="8000" placeholder="Напишите сообщение..."></textarea>
            <button type="submit" class="btn btn-primary">Отправить</button>
        </form>
    </div>
</div>

<script>
(function() {
    const chatMessages = document.getElementById('chatMessages');
    const chatForm = document.getElementById('chatForm');
    const chatInput = document.getElementById('chatInput');
    const peerId = chatMessages.dataset.peerId;
    const myId = chatMessages.dataset.myId;
    const knownIds = new Set();

    function formatDate(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        if (isNaN(d)) return iso;
        return d.toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
    }

    function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function createMessageEl(m) {
        const div = document.createElement('div');
        div.className = 'chat-message ' + (String(m.senderId) === String(myId) ? 'own' : 'other');
        div.dataset.id = m.id;

        const meta = document.createElement('div');
        meta.className = 'chat-meta';
        meta.textContent = formatDate(m.createdAt);
        div.appendChild(meta);

        const body = document.createElement('div');
        body.textContent = m.body;
        div.appendChild(body);

        if (String(m.senderId) === String(myId)) {
            const status = document.createElement('div');
            status.className = 'chat-status';
            let s = '';
            if (m.deliveredAt) s += 'доставлено';
            if (m.readAt) s += ' · прочитано';
            status.textContent = s;
            div.appendChild(status);
        }

        return div;
    }

    function appendMessage(m) {
        if (knownIds.has(m.id)) return false;
        knownIds.add(m.id);
        chatMessages.appendChild(createMessageEl(m));
        return true;
    }

    function hydrateExisting() {
        let maxIncomingId = null;
        chatMessages.querySelectorAll('.chat-message').forEach(el => {
            const id = Number(el.dataset.id);
            if (id) knownIds.add(id);
            if (el.classList.contains('other') && id) {
                maxIncomingId = Math.max(maxIncomingId || 0, id);
            }
        });
        if (maxIncomingId) markRead(maxIncomingId);
    }

    async function markRead(upToMessageId) {
        try {
            await fetch('/friends/chat/' + peerId + '/read?upToMessageId=' + upToMessageId, { method: 'POST' });
        } catch (e) {
            // ignore
        }
    }

    async function loadMessages() {
        try {
            const res = await fetch('/friends/chat/' + peerId + '/poll?limit=40');
            if (!res.ok) return;
            const data = await res.json();
            let added = false;
            let maxIncomingId = null;
            if (data.messages) {
                data.messages.forEach(m => {
                    if (appendMessage(m)) {
                        added = true;
                        if (String(m.senderId) === String(peerId)) {
                            maxIncomingId = Math.max(maxIncomingId || 0, m.id);
                        }
                    }
                });
            }
            if (added) scrollToBottom();
            if (maxIncomingId) await markRead(maxIncomingId);
        } catch (e) {
            // silently ignore polling errors
        }
    }

    async function sendMessage(e) {
        e.preventDefault();
        const text = chatInput.value.trim();
        if (!text) return;
        const formData = new URLSearchParams();
        formData.append('text', text);

        try {
            const res = await fetch('/friends/chat/' + peerId + '/send-ajax', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });
            if (res.ok) {
                chatInput.value = '';
                await loadMessages();
            }
        } catch (e) {
            alert('Не удалось отправить сообщение');
        }
    }

    hydrateExisting();
    scrollToBottom();
    chatForm.addEventListener('submit', sendMessage);

    chatInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            chatForm.dispatchEvent(new Event('submit'));
        }
    });

    setInterval(loadMessages, 3000);
})();
</script>
</body>
</html>
