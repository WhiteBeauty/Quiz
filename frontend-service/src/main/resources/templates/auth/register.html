<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <title>Регистрация — QuizArena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-page">
<div class="auth-split">
    <div class="auth-left">
        <a class="auth-logo" th:href="@{/}"><span class="brand-icon">⬡</span> QuizArena</a>
        <div class="auth-tagline">
            <h2>Присоединяйся к тысячам игроков.</h2>
        </div>
        <div class="auth-decoration">
            <div class="deco-card deco-1">🧠 Проверь знания</div>
            <div class="deco-card deco-2">👥 Игра с друзьями</div>
            <div class="deco-card deco-3">📊 Статистика побед</div>
        </div>
    </div>
    <div class="auth-right">
        <div class="auth-form-container">
            <h1>Создать аккаунт</h1>
            <p class="auth-subtitle">Бесплатно и без лишних слов</p>

            <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

            <form th:action="@{/auth/register}" method="post" class="auth-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="you@example.com" required/>
                </div>
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" name="username" placeholder="quiz_master" minlength="3" required/>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" name="password" placeholder="минимум 6 символов" minlength="6" required/>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Зарегистрироваться</button>
            </form>

            <p class="auth-switch">Уже есть аккаунт? <a th:href="@{/auth/login}">Войти</a></p>
        </div>
    </div>
</div>
</body>
</html>
