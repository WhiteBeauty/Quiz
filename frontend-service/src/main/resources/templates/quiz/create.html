<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <title>Создать квиз — QuizArena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" th:href="@{/}"><span class="brand-icon">⬡</span><span>QuizArena</span></a>
    <div class="navbar-links">
        <a th:href="@{/quizzes/public}">Квизы</a>
        <a th:href="@{/game/lobby}">Играть</a>
    </div>
    <div class="navbar-actions">
        <a th:href="@{/dashboard}" class="btn btn-ghost">Кабинет</a>
    </div>
</nav>

<div class="page-container narrow">
    <div class="page-header">
        <a th:href="@{/dashboard}" class="back-link">← Назад</a>
        <h1>Создать квиз</h1>
    </div>

    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/quizzes/create}" method="post" class="form-card">
        <div class="form-group">
            <label>Название квиза *</label>
            <input type="text" name="title" placeholder="Например: «Столицы мира»" required maxlength="255"/>
        </div>
        <div class="form-group">
            <label>Описание</label>
            <textarea name="description" placeholder="Кратко опишите о чём квиз..." rows="3"></textarea>
        </div>
        <div class="form-group">
            <label>Категория</label>
            <input type="text" name="category" placeholder="Например: География, История, Наука..."/>
        </div>
        <div class="form-actions">
            <a th:href="@{/dashboard}" class="btn btn-ghost">Отмена</a>
            <button type="submit" class="btn btn-primary">Создать и добавить вопросы →</button>
        </div>
    </form>
</div>

<footer class="footer"><p>QuizArena © 2026</p></footer>
</body>
</html>
