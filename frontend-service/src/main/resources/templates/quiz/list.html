<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Квизы — QuizPlatform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a th:href="@{/quizzes}" class="nav-logo">QUIZ<span>PLATFORM</span></a>
    <div class="nav-links">
        <a th:href="@{/quizzes}" class="nav-link active">Квизы</a>
        <a th:href="@{/game/lobby}" class="nav-link">Играть</a>
        <div class="nav-user">
            <span class="nav-username" th:text="${user.username}">User</span>
            <a th:href="@{/logout}" class="btn btn-outline btn-sm">Выйти</a>
        </div>
    </div>
</nav>

<main class="page-content">
    <div class="page-header">
        <div>
            <h1 class="page-title">Библиотека квизов</h1>
            <p class="page-subtitle">Создавайте и проходите квизы вместе</p>
        </div>
        <a th:href="@{/quizzes/create}" class="btn btn-primary">+ Создать квиз</a>
    </div>

    <!-- Search -->
    <form th:action="@{/quizzes}" method="get" class="search-bar">
        <input type="text" name="search" class="search-input" placeholder="Поиск по названию или категории..."
               th:value="${search}"/>
        <button type="submit" class="btn btn-primary">Найти</button>
        <a th:href="@{/quizzes}" class="btn btn-outline" th:if="${search}">Сбросить</a>
    </form>

    <!-- My quizzes -->
    <section th:if="${not #lists.isEmpty(myQuizzes)}">
        <h2 class="section-title">Мои квизы</h2>
        <div class="quiz-grid">
            <div class="quiz-card mine" th:each="quiz : ${myQuizzes}">
                <div class="quiz-card-header">
                    <span class="quiz-category" th:text="${quiz.category ?: 'Без категории'}">Категория</span>
                    <span class="quiz-badge" th:classappend="${quiz.published} ? 'badge-published' : 'badge-draft'"
                          th:text="${quiz.published} ? 'Опубликован' : 'Черновик'">Статус</span>
                </div>
                <h3 class="quiz-title" th:text="${quiz.title}">Название</h3>
                <p class="quiz-desc" th:text="${quiz.description ?: 'Без описания'}">Описание</p>
                <div class="quiz-meta">
                    <span th:text="${quiz.questionCount} + ' вопр.'">0 вопр.</span>
                </div>
                <div class="quiz-actions">
                    <a th:href="@{/quizzes/{id}/questions(id=${quiz.id})}" class="btn btn-outline btn-sm">Редактировать</a>
                    <form th:action="@{/quizzes/{id}/publish(id=${quiz.id})}" method="post" style="display:inline"
                          th:if="${!quiz.published}">
                        <button type="submit" class="btn btn-accent btn-sm">Опубликовать</button>
                    </form>
                    <form th:action="@{/game/create}" method="post" style="display:inline" th:if="${quiz.published}">
                        <input type="hidden" name="quizId" th:value="${quiz.id}"/>
                        <button type="submit" class="btn btn-primary btn-sm">Запустить</button>
                    </form>
                    <form th:action="@{/quizzes/{id}/delete(id=${quiz.id})}" method="post" style="display:inline"
                          onsubmit="return confirm('Удалить квиз?')">
                        <button type="submit" class="btn btn-danger btn-sm">✕</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Public quizzes -->
    <section>
        <h2 class="section-title" th:text="${search != null} ? 'Результаты поиска' : 'Все опубликованные квизы'">Квизы</h2>

        <div class="empty-state" th:if="${#lists.isEmpty(quizzes)}">
            <div class="empty-icon">📚</div>
            <p>Квизов пока нет</p>
            <a th:href="@{/quizzes/create}" class="btn btn-primary">Создать первый</a>
        </div>

        <div class="quiz-grid" th:if="${not #lists.isEmpty(quizzes)}">
            <div class="quiz-card" th:each="quiz : ${quizzes}">
                <div class="quiz-card-header">
                    <span class="quiz-category" th:text="${quiz.category ?: 'Без категории'}">Категория</span>
                </div>
                <h3 class="quiz-title" th:text="${quiz.title}">Название</h3>
                <p class="quiz-desc" th:text="${quiz.description ?: 'Без описания'}">Описание</p>
                <div class="quiz-meta">
                    <span th:text="${quiz.questionCount} + ' вопр.'">0 вопр.</span>
                    <span th:text="'Автор: ' + ${quiz.authorUsername}">Автор</span>
                </div>
                <div class="quiz-actions">
                    <form th:action="@{/game/create}" method="post">
                        <input type="hidden" name="quizId" th:value="${quiz.id}"/>
                        <button type="submit" class="btn btn-primary btn-sm">▶ Запустить игру</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</main>
</body>
</html>
