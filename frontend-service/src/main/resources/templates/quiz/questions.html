<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <title th:text="'Вопросы: ' + ${quiz.title} + ' — QuizArena'">Вопросы — QuizArena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" th:href="@{/}"><span class="brand-icon">⬡</span><span>QuizArena</span></a>
    <div class="navbar-links">
        <a th:href="@{/quizzes/public}">Квизы</a>
        <a th:href="@{/game/lobby}">Играть</a>
        <a th:href="@{/friends}">Друзья
            <span class="nav-notification-badge" th:if="${unreadMessagesCount > 0}" th:text="${unreadMessagesCount}"></span>
        </a>
    </div>
    <div class="navbar-actions">
        <a th:href="@{/dashboard}" class="btn btn-ghost">Кабинет</a>
    </div>
</nav>

<div class="page-container">
    <div class="alert alert-success" th:if="${param.questionDeleted != null and param.questionDeleted[0] == 'true'}">
        Вопрос удален.
    </div>
    <div class="alert alert-danger" th:if="${param.questionDeleted != null and param.questionDeleted[0] == 'false'}">
        Не удалось удалить вопрос.
    </div>
    <div class="page-header">
        <div>
            <a th:href="@{/dashboard}" class="back-link">← Назад</a>
            <h1 th:text="${quiz.title}">Квиз</h1>
            <span class="badge" th:classappend="${quiz.published ? 'badge-green' : 'badge-gray'}"
                  th:text="${quiz.published ? 'Опубликован' : 'Черновик'}">Статус</span>
        </div>
        <div class="page-header-actions">
            <a th:href="@{/quizzes/{id}/add-question(id=${quiz.id})}" class="btn btn-primary">+ Добавить вопрос</a>
            <form th:action="@{/quizzes/{id}/publish(id=${quiz.id})}" method="post" style="display:inline"
                  th:unless="${quiz.published}">
                <button type="submit" class="btn btn-outline"
                        th:disabled="${quiz.questionCount == 0}">Опубликовать</button>
            </form>
        </div>
    </div>

    <div th:if="${quiz.questions == null or quiz.questions.empty}" class="empty-state large">
        <div class="empty-icon">❓</div>
        <p>Вопросов ещё нет</p>
        <a th:href="@{/quizzes/{id}/add-question(id=${quiz.id})}" class="btn btn-primary">Добавить первый вопрос</a>
    </div>

    <div class="questions-list" th:unless="${quiz.questions == null or quiz.questions.empty}">
        <div class="question-item" th:each="q, stat : ${quiz.questions}">
            <div class="qi-num" th:text="${stat.index + 1}">1</div>
            <div class="qi-body">
                <p class="qi-text" th:text="${q.text}">Текст вопроса</p>
                <div class="qi-options">
                    <span class="qi-opt" th:each="opt : ${q.answerOptions}"
                          th:classappend="${opt.correct ? ' correct' : ''}"
                          th:text="${opt.text}">Вариант</span>
                </div>
            </div>
            <div class="qi-meta">
                <span class="qi-time" th:text="${q.timeLimitSeconds + 'с'}">30с</span>
                <span class="qi-points" th:text="${q.points + 'оч'}">10оч</span>
                <a th:href="@{/quizzes/{quizId}/questions/{questionId}/edit(quizId=${quiz.id},questionId=${q.id})}"
                   class="btn btn-sm btn-outline" style="margin-left:8px;">Изменить</a>
                <form th:action="@{/quizzes/{quizId}/questions/{questionId}/delete(quizId=${quiz.id},questionId=${q.id})}"
                      method="post" style="display:inline; margin-left:8px;"
                      onsubmit="return confirm('Удалить вопрос?')">
                    <button type="submit" class="btn btn-sm btn-danger">Удалить</button>
                </form>
            </div>
        </div>
    </div>
</div>

<footer class="footer"><p>QuizArena © 2026</p></footer>
</body>
</html>
