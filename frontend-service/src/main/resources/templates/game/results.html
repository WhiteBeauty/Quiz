<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <title>Результаты — QuizArena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" th:href="@{/}"><span class="brand-icon">⬡</span><span>QuizArena</span></a>
    <div class="navbar-actions">
        <a th:href="@{/game/lobby}" class="btn btn-outline">Новая игра</a>
        <a th:href="@{/dashboard}" class="btn btn-ghost">Кабинет</a>
    </div>
</nav>

<div class="page-container narrow">
    <div class="results-header">
        <h1>🏆 Результаты игры</h1>
        <p class="results-code" th:text="'Комната: ' + ${room.code}">Комната</p>
    </div>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="podium" th:if="${leaderboard != null and leaderboard.size() >= 3}">
        <div class="podium-place second">
            <div class="podium-avatar" th:text="${leaderboard[1].username.substring(0,1).toUpperCase()}">A</div>
            <div class="podium-name" th:text="${leaderboard[1].username}">player2</div>
            <div class="podium-score" th:text="${leaderboard[1].score}">0</div>
            <div class="podium-block p2">🥈</div>
        </div>
        <div class="podium-place first">
            <div class="podium-crown">👑</div>
            <div class="podium-avatar" th:text="${leaderboard[0].username.substring(0,1).toUpperCase()}">A</div>
            <div class="podium-name" th:text="${leaderboard[0].username}">player1</div>
            <div class="podium-score" th:text="${leaderboard[0].score}">0</div>
            <div class="podium-block p1">🥇</div>
        </div>
        <div class="podium-place third" th:if="${leaderboard.size() >= 3}">
            <div class="podium-avatar" th:text="${leaderboard[2].username.substring(0,1).toUpperCase()}">A</div>
            <div class="podium-name" th:text="${leaderboard[2].username}">player3</div>
            <div class="podium-score" th:text="${leaderboard[2].score}">0</div>
            <div class="podium-block p3">🥉</div>
        </div>
    </div>

    <div class="full-leaderboard" th:if="${leaderboard != null and !leaderboard.empty}">
        <h2>Полная таблица</h2>
        <div class="lb-table">
            <div class="lb-row header-row">
                <span>#</span><span>Игрок</span><span>Очки</span><span>Верных</span>
            </div>
            <div class="lb-row" th:each="entry : ${leaderboard}"
                 th:classappend="${entry.rank <= 3 ? ' top' : ''}">
                <span class="lb-rank" th:text="${entry.rank}">1</span>
                <span class="lb-name" th:text="${entry.username}">player</span>
                <span class="lb-score" th:text="${entry.score}">0</span>
                <span class="lb-correct" th:text="${entry.correctAnswers + '/' + (entry.correctAnswers + 0)}">0</span>
            </div>
        </div>
    </div>

    <div class="results-actions">
        <a th:href="@{/game/lobby}" class="btn btn-primary">Ещё раз</a>
        <a th:href="@{/leaderboard}" class="btn btn-outline">Глобальный рейтинг</a>
    </div>
</div>

<footer class="footer"><p>QuizArena © 2026</p></footer>
</body>
</html>
